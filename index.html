<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>汉盛律师 - 智能法律助手</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.waves.min.js"></script>
    
    <style>
        /* --- 全局暗黑科幻风格 --- */
        :root {
            --primary-red: #8b181b; 
            --glass-bg: rgba(5, 8, 15, 0.4); 
            --glass-border: rgba(255, 255, 255, 0.05); 
            --text-white: #ffffff;
            --text-cyan: #8ce8ff; 
            --text-light: #8b949e;
            --hover-bg: rgba(255, 255, 255, 0.05);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            color: var(--text-white);
            background-color: #000000; 
            overflow: hidden;
        }

        /* --- 动态 3D 波浪背景容器 --- */
        #vanta-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
        }

        /* --- 主体布局 --- */
        .app-container {
            position: relative;
            z-index: 10;
            display: flex;
            width: 100%;
            height: 100%;
            background: transparent; 
        }

        /* --- 左侧菜单栏 --- */
        aside {
            width: 280px;
            background: linear-gradient(180deg, rgba(10,12,20,0.8) 0%, rgba(5,6,10,0.6) 100%);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            padding: 24px 20px;
            flex-shrink: 0;
        }

        .new-chat-btn {
            background-color: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 14px 16px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 400;
            color: var(--text-white);
            transition: all 0.3s ease;
            margin-bottom: 35px;
            font-size: 14px;
            letter-spacing: 1px;
        }

        .new-chat-btn:hover {
            background-color: rgba(140, 232, 255, 0.1);
            border-color: rgba(140, 232, 255, 0.3);
            box-shadow: 0 0 15px rgba(140, 232, 255, 0.2);
            color: var(--text-cyan);
        }

        .history-title { font-size: 12px; color: var(--text-light); margin-bottom: 16px; padding-left: 8px; letter-spacing: 1px; }
        .history-list { list-style: none; padding: 0; margin: 0; overflow-y: auto; flex: 1; }
        .history-item { padding: 12px 16px; border-radius: 8px; cursor: pointer; font-size: 14px; color: rgba(255, 255, 255, 0.6); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; transition: all 0.2s; margin-bottom: 4px; }
        .history-item:hover { background-color: var(--hover-bg); color: var(--text-white); }
        .history-item.active { background-color: rgba(140, 232, 255, 0.14); color: var(--text-cyan); border: 1px solid rgba(140, 232, 255, 0.28); }
        .history-empty { padding: 12px 16px; font-size: 13px; color: rgba(255,255,255,0.35); }

        /* --- 右侧主内容区 --- */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        header {
            padding: 24px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        /* --- 优化 1 & 2: Logo 完美融合并放大 --- */
        .logo-container {
            display: flex;
            align-items: center;
            background: transparent; /* 去除白底 */
        }

        header img {
            height: 55px; /* 放大更醒目 */
            object-fit: contain;
            /* 滤镜魔法：颜色反转、提亮，并滤除黑色背景，使其变为全息发光体 */
            filter: invert(1) brightness(1.8) contrast(1.2);
            mix-blend-mode: screen;
            opacity: 0.9;
            transition: all 0.3s ease;
        }
        
        header img:hover {
            opacity: 1;
            filter: invert(1) brightness(2.2) contrast(1.2);
        }

        /* --- 右上角功能区 (头像与设置) --- */
        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .settings-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--text-white);
            border-radius: 50%;
            width: 42px;
            height: 42px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .settings-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 15px rgba(255,255,255,0.2);
            transform: rotate(45deg);
        }

        .user-avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary-red), #e63946);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 0 15px rgba(139, 24, 27, 0.4);
            text-transform: uppercase;
        }

        main { flex: 1; display: flex; justify-content: center; overflow-y: auto; padding: 20px; scroll-behavior: smooth; position: relative; }

        /* --- 首页欢迎语 --- */
        .welcome-screen { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100%; position: absolute; width: 100%; top: -5%; left: 0; pointer-events: none; transition: opacity 0.5s ease; }
        .stellar-greeting { font-size: 52px; font-weight: 200; letter-spacing: 8px; color: #ffffff; text-shadow: 0 0 30px rgba(140, 232, 255, 0.6), 0 0 60px rgba(140, 232, 255, 0.3); text-align: center; margin-bottom: 16px; }
        .stellar-subtext { font-size: 16px; font-weight: 300; letter-spacing: 2px; color: rgba(255, 255, 255, 0.5); mask-image: linear-gradient(to bottom, white 50%, rgba(255,255,255,0.1) 100%); -webkit-mask-image: linear-gradient(to bottom, white 50%, rgba(255,255,255,0.1) 100%); }

        /* --- 聊天区域与输入框 --- */
        .chat-container { width: 100%; max-width: 800px; display: flex; flex-direction: column; gap: 30px; padding-bottom: 20px; z-index: 5; }
        .message { display: flex; flex-direction: column; max-width: 85%; line-height: 1.6; font-size: 15px; }
        .message.user { align-self: flex-end; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); padding: 16px 24px; border-radius: 20px 20px 4px 20px; border: 1px solid rgba(255, 255, 255, 0.1); }
        .message.ai { align-self: flex-start; padding: 16px 0; }
        .message-content { white-space: pre-wrap; word-break: break-word; }
        .message-sender { font-size: 13px; font-weight: 500; color: var(--text-light); margin-bottom: 8px; letter-spacing: 1px; }
        .ai .message-sender { color: var(--text-cyan); text-shadow: 0 0 10px rgba(140, 232, 255, 0.4); }

        footer { padding: 0 40px 40px; display: flex; justify-content: center; }
        .footer-inner { width: 100%; max-width: 800px; display: flex; flex-direction: column; gap: 10px; }
        .attachment-list { display: flex; flex-wrap: wrap; gap: 8px; min-height: 0; }
        .thinking-status { border: 1px solid rgba(140, 232, 255, 0.28); background: rgba(140, 232, 255, 0.08); border-radius: 10px; padding: 8px 10px; }
        .thinking-status[hidden] { display: none; }
        .thinking-meta { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 6px; font-size: 12px; color: #d7f6ff; }
        .thinking-track { height: 8px; width: 100%; border-radius: 999px; background: rgba(255, 255, 255, 0.14); overflow: hidden; }
        .thinking-bar { height: 100%; width: 0; border-radius: 999px; background: linear-gradient(90deg, #24b9ff, #95f2ff); transition: width 0.25s linear; }
        .attachment-chip { display: inline-flex; align-items: center; gap: 8px; border: 1px solid rgba(140, 232, 255, 0.28); background: rgba(140, 232, 255, 0.08); color: #d7f6ff; padding: 6px 10px; border-radius: 999px; font-size: 12px; max-width: 100%; }
        .attachment-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 260px; }
        .attachment-remove { border: none; background: transparent; color: rgba(215, 246, 255, 0.9); cursor: pointer; font-size: 14px; line-height: 1; padding: 0; }
        .attachment-remove:hover { color: #ffffff; }
        .attach-btn.active { color: var(--text-cyan); box-shadow: 0 0 12px rgba(140, 232, 255, 0.25) inset; }
        .attach-btn:disabled, .send-btn:disabled { opacity: 0.45; cursor: not-allowed; }
        .hidden-attachment-input { display: none; }
        .input-box { width: 100%; max-width: 800px; background-color: rgba(10, 15, 25, 0.6); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; display: flex; align-items: flex-end; padding: 12px 16px; transition: all 0.3s ease; box-shadow: 0 10px 40px rgba(0,0,0,0.8); }
        .input-box:focus-within { border-color: rgba(140, 232, 255, 0.4); box-shadow: 0 0 20px rgba(140, 232, 255, 0.1), 0 10px 40px rgba(0,0,0,0.8); background-color: rgba(15, 20, 35, 0.7); }
        .attach-btn, .send-btn { background: none; border: none; cursor: pointer; padding: 10px; border-radius: 12px; color: rgba(255,255,255,0.4); display: flex; justify-content: center; align-items: center; transition: all 0.2s ease; flex-shrink: 0; margin-bottom: 2px; }
        .attach-btn:hover, .send-btn:hover { background-color: rgba(255,255,255,0.08); color: var(--text-white); }
        textarea { flex: 1; border: none; outline: none; resize: none; max-height: 200px; min-height: 24px; padding: 10px 16px; font-size: 15px; font-family: inherit; background: transparent; color: var(--text-white); line-height: 1.5; letter-spacing: 0.5px; }
        textarea::placeholder { color: rgba(255, 255, 255, 0.2); }
        .icon-svg { width: 22px; height: 22px; fill: currentColor; }
        .chat-container:not(:empty) ~ .welcome-screen { display: none; }

        /* --- 设置面板模态框 --- */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); z-index: 100; display: none; justify-content: center; align-items: center; opacity: 0; transition: opacity 0.3s ease; }
        .modal-overlay.active { display: flex; opacity: 1; }
        .settings-modal { background: rgba(15, 20, 30, 0.85); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 30px; width: 400px; box-shadow: 0 20px 50px rgba(0,0,0,0.8), 0 0 30px rgba(140,232,255,0.05); color: white; transform: translateY(-20px); transition: transform 0.3s ease; }
        .modal-overlay.active .settings-modal { transform: translateY(0); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; font-size: 18px; font-weight: 500; letter-spacing: 1px;}
        .close-btn { background: none; border: none; color: #8b949e; cursor: pointer; font-size: 24px; padding: 0; line-height: 1; }
        .close-btn:hover { color: white; }
        .setting-group { margin-bottom: 20px; display: flex; flex-direction: column; gap: 10px; }
        .setting-group label { font-size: 13px; color: #8b949e; text-transform: uppercase; letter-spacing: 1px; }
        .custom-select, .custom-input { background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 12px 16px; border-radius: 8px; font-size: 15px; outline: none; transition: border-color 0.2s; }
        .custom-select { cursor: pointer; }
        .custom-select:focus, .custom-input:focus { border-color: rgba(140,232,255,0.5); }
        .custom-select option { background: #0f141e; color: white; }
        .toggle-row { display: flex; align-items: center; gap: 8px; font-size: 13px; color: rgba(255,255,255,0.72); }
        .toggle-row input[type="checkbox"] { width: 16px; height: 16px; accent-color: #2d7ef7; }
        .account-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
        .account-tag { font-size: 13px; color: rgba(255,255,255,0.82); }
        .danger-btn { border: 1px solid rgba(220, 38, 38, 0.35); background: rgba(220, 38, 38, 0.12); color: #ffd7d7; border-radius: 8px; padding: 8px 12px; cursor: pointer; font-size: 13px; }
        .danger-btn:hover { background: rgba(220, 38, 38, 0.2); }
        .app-container.hidden { display: none; }
        .login-overlay {
            position: fixed;
            inset: 0;
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.72);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        .login-panel {
            width: min(480px, 92vw);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 16px;
            padding: 24px;
            background: rgba(12, 18, 30, 0.92);
            box-shadow: 0 24px 80px rgba(0,0,0,0.65);
        }
        .login-title { margin: 0 0 8px; font-size: 22px; letter-spacing: 1px; }
        .login-subtitle { margin: 0 0 18px; color: rgba(255,255,255,0.62); font-size: 13px; line-height: 1.5; }
        .login-actions { margin-top: 14px; display: flex; align-items: center; gap: 10px; }
        .primary-btn {
            border: 1px solid rgba(140,232,255,0.4);
            background: rgba(45, 126, 247, 0.25);
            color: #eaf6ff;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 14px;
            cursor: pointer;
        }
        .primary-btn:hover { background: rgba(45, 126, 247, 0.35); }
        .login-error { min-height: 20px; margin: 0; color: #ff9ea0; font-size: 13px; }
        .account-hint { font-size: 12px; color: rgba(255,255,255,0.55); line-height: 1.5; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 2px; }
    </style>
</head>
<body>

    <div id="vanta-bg"></div>

    <div class="login-overlay" id="login-overlay">
        <div class="login-panel">
            <h2 class="login-title">账户登录</h2>
            <p class="login-subtitle">登录后才可使用智能问答功能。请使用已分配账户登录。</p>
            <form id="login-form">
                <div class="setting-group">
                    <label for="login-account">账号</label>
                    <select id="login-account" class="custom-select">
                        <option value="jaylaw-ai">jaylaw-ai（诉讼业务组）</option>
                        <option value="jiexinlaw-ai">jiexinlaw-ai（仲裁业务组）</option>
                    </select>
                </div>
                <div class="setting-group">
                    <label for="login-password">密码</label>
                    <input id="login-password" type="password" class="custom-input" autocomplete="current-password" placeholder="请输入密码">
                </div>
                <div class="login-actions">
                    <button id="login-submit" type="submit" class="primary-btn">登录并进入系统</button>
                </div>
                <p id="login-error" class="login-error"></p>
            </form>
        </div>
    </div>

    <div class="app-container hidden" id="app-root">
        <aside>
            <button class="new-chat-btn" id="ui-new-chat">
                <svg class="icon-svg" viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
                <span>新建智能案卷</span>
            </button>
            <div class="history-title" id="ui-history-title">智能对话历史</div>
            <ul class="history-list" id="history-list"></ul>
        </aside>

        <div class="main-content">
            <header>
                <div class="logo-container">
                    <img src="logo.jpg" alt="汉盛律师 Logo">
                </div>
                <div class="header-right">
                    <button class="settings-btn" id="open-settings" title="系统设置">
                        <svg class="icon-svg" viewBox="0 0 24 24"><path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.06-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.73,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.06,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.43-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.49-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/></svg>
                    </button>
                    <div class="user-avatar" id="header-avatar">王</div>
                </div>
            </header>

            <main id="chat-box">
                <div class="welcome-screen" id="welcome-screen">
                    <div class="stellar-greeting" id="main-greeting">你好，王律师</div>
                    <div class="stellar-subtext" id="ui-subtext">Empowering Your Business with Artificial Intelligence</div>
                </div>

                <div class="chat-container" id="chat-container"></div>
            </main>

            <footer>
                <div class="footer-inner">
                    <div class="attachment-list" id="attachment-list"></div>
                    <div class="thinking-status" id="thinking-status" hidden>
                        <div class="thinking-meta">
                            <span id="thinking-text">正在思考中...</span>
                            <span id="thinking-eta">预计剩余 -- 秒</span>
                        </div>
                        <div class="thinking-track">
                            <div class="thinking-bar" id="thinking-bar"></div>
                        </div>
                    </div>
                    <div class="input-box">
                        <button class="attach-btn" id="attach-btn" title="上传附件"><svg class="icon-svg" viewBox="0 0 24 24"><path d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5a2.5 2.5 0 0 1 5 0v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v11.5c0 1.38 1.12 2.5 2.5 2.5s2.5-1.12 2.5-2.5V5c0-1.66-1.34-3-3-3S9 3.34 9 5v12.5c0 3.04 2.46 5.5 5.5 5.5s5.5-2.46 5.5-5.5V6h-1.5z"/></svg></button>
                        <textarea id="user-input" rows="1" placeholder="输入案情或法律问题，开始专业法律问答..."></textarea>
                        <button class="send-btn" id="send-btn"><svg class="icon-svg" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg></button>
                    </div>
                    <input id="attachment-input" class="hidden-attachment-input" type="file" multiple accept=".txt,.md,.csv,.json,.pdf,.png,.jpg,.jpeg,.webp,.doc,.docx,.xls,.xlsx,text/plain,text/markdown,text/csv,application/json,application/pdf,image/png,image/jpeg,image/webp,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document,application/vnd.ms-excel,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet">
                </div>
            </footer>
        </div>
    </div>

    <div class="modal-overlay" id="settings-overlay">
        <div class="settings-modal">
            <div class="modal-header">
                <span id="ui-settings-title">系统设置 (Settings)</span>
                <button class="close-btn" id="close-settings">&times;</button>
            </div>
            
            <div class="setting-group">
                <label id="ui-account-label">当前登录账号 (Account)</label>
                <div class="account-row">
                    <div class="account-tag" id="account-display">-</div>
                    <button class="danger-btn" id="logout-btn" type="button">退出登录</button>
                </div>
            </div>

            <div class="setting-group">
                <label id="ui-name-label">修改当前名称 (Edit Display Name)</label>
                <input type="text" class="custom-input" id="name-input" placeholder="输入新的显示名称">
            </div>

            <div class="setting-group">
                <label id="ui-lang-label">界面语言 (Language)</label>
                <select class="custom-select" id="lang-select">
                    <option value="zh">中文 (Chinese)</option>
                    <option value="en">English</option>
                </select>
            </div>

            <div class="setting-group">
                <label id="ui-model-label">模型选择 (Model)</label>
                <select class="custom-select" id="model-select">
                    <option value="gemini-3.1-pro-preview">Gemini 3.1 Pro</option>
                    <option value="gemini-3-pro-preview">Gemini 3.0 Deep Think</option>
                    <option value="gemini-2.5-flash">Gemini 2.5 Flash</option>
                    <option value="gemma-3-1b-it">Gemma 3 1B</option>
                    <option value="gemma-3-4b-it">Gemma 3 4B</option>
                </select>
            </div>

            <div class="setting-group">
                <label id="ui-thinking-label">思考时长 (Thinking Time)</label>
                <select class="custom-select" id="thinking-mode-select">
                    <option value="standard">标准（约90秒）</option>

            deep: 150_000,

        const DEFAULT_THINKING_MODE = "standard";
        const MAX_ATTACHMENTS = 4;
        const MAX_FILE_SIZE_BYTES = 6 * 1024 * 1024;
        const MAX_TEXT_ATTACHMENT_CHARS = 120000;
        const TEXT_MIME_TYPES = new Set(["text/plain", "text/markdown", "text/csv", "application/json"]);
        const BINARY_MIME_TYPES = new Set([
            "application/pdf",
            "image/png",
            "image/jpeg",
            "image/webp",
            "application/msword",
            "application/vnd.openxmlformats-officedocument.wordprocessingml.document",
            "application/vnd.ms-excel",

        ]);

        let currentLang = "zh";
        let currentUser = null;
        let authToken = "";
        let supportedModels = [...FALLBACK_MODELS];
        let serverDefaultModel = DEFAULT_MODEL;
        let pendingAttachments = [];

        try {
            localStorage.removeItem(LEGACY_API_BASE_STORAGE_KEY);
        } catch (error) {
            console.warn("清理旧后端地址缓存失败", error);
        }

        function safeJSONParse(raw, fallbackValue) {
            try {
                const parsed = JSON.parse(raw);
                return parsed && typeof parsed === "object" ? parsed : fallbackValue;
            } catch {
                return fallbackValue;
            }
        }

        function loadChatState() {
            const raw = localStorage.getItem(CHAT_STORAGE_KEY);
            if (!raw) return {};
            return safeJSONParse(raw, {});
        }

        function saveChatState() {
            localStorage.setItem(CHAT_STORAGE_KEY, JSON.stringify(chatState));
        }

        function loadProfileStore() {
            const raw = localStorage.getItem(PROFILE_STORAGE_KEY);
            if (!raw) return {};
            return safeJSONParse(raw, {});
        }

        function saveProfileStore() {
            localStorage.setItem(PROFILE_STORAGE_KEY, JSON.stringify(profileStore));
        }

        function buildBackendApiUrls(apiPath) {
            const normalizedPath = apiPath.startsWith("/") ? apiPath : `/${apiPath}`;
            const isFileMode = window.location.protocol === "file:";
            const isLocalWebHost = ["localhost", "127.0.0.1"].includes(window.location.hostname);
            const endpoints = [];

            if (isFileMode) {
                endpoints.push(`http://localhost:3000${normalizedPath}`);
            } else {
                endpoints.push(`${window.location.origin}${normalizedPath}`);
                if (isLocalWebHost) {
                    endpoints.push(`http://localhost:3000${normalizedPath}`);
                }
            }
            return [...new Set(endpoints)];
        }

        function readAuthToken() {
            return localStorage.getItem(AUTH_TOKEN_STORAGE_KEY) || "";
        }

        function writeAuthToken(token) {
            localStorage.setItem(AUTH_TOKEN_STORAGE_KEY, token);
        }

        function clearAuthToken() {
            localStorage.removeItem(AUTH_TOKEN_STORAGE_KEY);
        }

        function normalizeModel(rawModel) {
            const value = String(rawModel || "").trim();
            if (!value) return serverDefaultModel;
            return supportedModels.includes(value) ? value : serverDefaultModel;
        }

        function readSelectedModel() {
            return normalizeModel(localStorage.getItem(MODEL_STORAGE_KEY) || serverDefaultModel);
        }

        function writeSelectedModel(rawModel) {
            const normalized = normalizeModel(rawModel);
            localStorage.setItem(MODEL_STORAGE_KEY, normalized);
            return normalized;
        }

        function readWebSearchEnabled() {
            const raw = localStorage.getItem(WEB_SEARCH_STORAGE_KEY);
            if (raw === null) return true;
            return raw === "1";
        }

        function writeWebSearchEnabled(enabled) {
            localStorage.setItem(WEB_SEARCH_STORAGE_KEY, enabled ? "1" : "0");
            return enabled;
        }

        function normalizeThinkingMode(rawMode) {
            const mode = String(rawMode || "").trim();
            if (Object.prototype.hasOwnProperty.call(THINKING_MODE_TIMEOUT_MS, mode)) {
                return mode;
            }
            return DEFAULT_THINKING_MODE;
        }

        function readThinkingMode() {
            return normalizeThinkingMode(localStorage.getItem(THINKING_MODE_STORAGE_KEY) || DEFAULT_THINKING_MODE);
        }

        function writeThinkingMode(rawMode) {
            const mode = normalizeThinkingMode(rawMode);
            localStorage.setItem(THINKING_MODE_STORAGE_KEY, mode);
            return mode;
        }

        function getRequestTimeoutByThinkingMode(mode) {
            const normalized = normalizeThinkingMode(mode);
            return THINKING_MODE_TIMEOUT_MS[normalized];
        }

        function toPrettyModelName(modelId) {
            const lower = String(modelId || "").toLowerCase();
            if (lower === "gemini-3.1-pro-preview") return "Gemini 3.1 Pro";
            if (lower === "gemini-3-pro-preview") return "Gemini 3.0 Deep Think";
            return modelId.replace(/^gemini-/i, "Gemini ").replace(/-/g, " ");
        }

        function renderModelOptions() {
            elements.modelSelect.innerHTML = "";
            supportedModels.forEach((modelId) => {
                const option = document.createElement("option");
                option.value = modelId;
                option.textContent = `${toPrettyModelName(modelId)} (${modelId})`;
                elements.modelSelect.appendChild(option);
            });
            elements.modelSelect.value = writeSelectedModel(readSelectedModel());
        }

        async function fetchModelOptions() {
            const data = await requestBackend("/api/models", {
                method: "GET",
                requireAuth: true
            });

            if (Array.isArray(data.models) && data.models.length > 0) {
                supportedModels = [...new Set(data.models.map((item) => String(item || "").trim()).filter(Boolean))];
            }
            if (typeof data.defaultModel === "string" && data.defaultModel.trim()) {
                serverDefaultModel = data.defaultModel.trim();
                if (!supportedModels.includes(serverDefaultModel)) {
                    supportedModels.unshift(serverDefaultModel);
                }
            }
            renderModelOptions();
        }

        function getAvatarFromName(name) {
            const value = String(name || "").trim();
            if (!value) return "律";
            return value.charAt(0).toUpperCase();
        }

        function getCurrentProfile() {
            if (!currentUser) return null;
            const key = currentUser.id;
            if (!profileStore[key]) {
                profileStore[key] = {
                    nameZh: currentUser.displayName || currentUser.account,
                    nameEn: currentUser.displayName || currentUser.account
                };
                saveProfileStore();
            }
            return profileStore[key];
        }

        function getDisplayName() {
            const profile = getCurrentProfile();
            if (!profile) return "";
            return currentLang === "zh" ? profile.nameZh : profile.nameEn;
        }

        function updateProfileName(name) {
            if (!currentUser) return;
            const normalized = String(name || "").trim();
            if (!normalized) return;
            const profile = getCurrentProfile();
            profile.nameZh = normalized;
            profile.nameEn = normalized;
            saveProfileStore();
        }

        async function syncProfileNameToServer(name) {
            if (!currentUser) return;
            const normalized = String(name || "").trim();
            if (!normalized) return;
            try {
                await requestBackend("/api/profile", {
                    method: "POST",
                    requireAuth: true,
                    body: { displayName: normalized }
                });
            } catch (error) {
                console.warn("同步昵称失败", error);
            }
        }

        function createEmptyUserChatState() {
            return {
                activeConversationId: "",
                conversations: []
            };
        }

        const chatState = loadChatState();
        const profileStore = loadProfileStore();

        function getUserChatState() {
            if (!currentUser) return createEmptyUserChatState();
            const userId = currentUser.id;
            if (!chatState[userId] || typeof chatState[userId] !== "object") {
                chatState[userId] = createEmptyUserChatState();
            }
            if (!Array.isArray(chatState[userId].conversations)) {
                chatState[userId].conversations = [];
            }
            if (typeof chatState[userId].activeConversationId !== "string") {
                chatState[userId].activeConversationId = "";
            }
            return chatState[userId];
        }

        function getConversationTitleFromText(text) {
            const source = String(text || "").split("\n")[0].trim();
            if (!source) return currentLang === "zh" ? "新建智能案卷" : "New Smart Case";
            return source.length > 26 ? `${source.slice(0, 26)}...` : source;
        }

        function createConversation(seedText = "") {
            const now = Date.now();
            return {
                id: `cv_${now}_${Math.random().toString(36).slice(2, 8)}`,
                title: getConversationTitleFromText(seedText),
                messages: [],
                createdAt: now,
                updatedAt: now
            };
        }

        function sortConversationsByUpdatedAt(userState) {
            userState.conversations.sort((a, b) => Number(b.updatedAt || 0) - Number(a.updatedAt || 0));
        }

        function getActiveConversation() {
            const userState = getUserChatState();
            if (!userState.activeConversationId) return null;
            return userState.conversations.find((item) => item.id === userState.activeConversationId) || null;
        }

        function ensureActiveConversation() {
            const existing = getActiveConversation();
            if (existing) return existing;

            const userState = getUserChatState();
            const conversation = createConversation("");
            userState.conversations.unshift(conversation);
            userState.activeConversationId = conversation.id;
            saveChatState();
            return conversation;
        }

        function setActiveConversation(conversationId) {
            const userState = getUserChatState();
            const found = userState.conversations.find((item) => item.id === conversationId);
            if (!found) return;
            userState.activeConversationId = found.id;
            saveChatState();
        }

        function createNewConversation() {
            const userState = getUserChatState();
            const conversation = createConversation("");
            userState.conversations.unshift(conversation);
            userState.activeConversationId = conversation.id;
            saveChatState();
            return conversation;
        }

        function addMessageToConversation(conversationId, role, content) {
            const userState = getUserChatState();
            const conversation = userState.conversations.find((item) => item.id === conversationId);
            if (!conversation) return;

            conversation.messages.push({
                role,
                content: String(content || ""),
                createdAt: Date.now()
            });
            conversation.updatedAt = Date.now();

            if (role === "user" && conversation.messages.filter((msg) => msg.role === "user").length === 1) {
                conversation.title = getConversationTitleFromText(content);
            }

            sortConversationsByUpdatedAt(userState);
            saveChatState();
        }

        function setWelcomeVisible(visible) {
            if (visible) {
                elements.welcomeScreen.style.display = "flex";
                elements.welcomeScreen.style.opacity = "1";
            } else {
                elements.welcomeScreen.style.display = "none";
                elements.welcomeScreen.style.opacity = "0";
            }
        }

        function appendUserMessage(text) {
            const userMessage = document.createElement("div");
            userMessage.className = "message user";
            const content = document.createElement("div");
            content.className = "message-content";
            content.textContent = text;
            userMessage.appendChild(content);
            elements.chatContainer.appendChild(userMessage);
            elements.chatBox.scrollTop = elements.chatBox.scrollHeight;
        }

        function appendAiMessage(contentText) {
            const aiMessage = document.createElement("div");
            aiMessage.className = "message ai";

            const sender = document.createElement("div");
            sender.className = "message-sender";
            sender.textContent = "汉盛星尘引擎 v2.0";

            const content = document.createElement("div");
            content.className = "message-content";
            content.textContent = contentText;

            aiMessage.appendChild(sender);
            aiMessage.appendChild(content);
            elements.chatContainer.appendChild(aiMessage);
            elements.chatBox.scrollTop = elements.chatBox.scrollHeight;
            return content;
        }

        function renderConversationMessages() {
            elements.chatContainer.innerHTML = "";
            const conversation = getActiveConversation();
            if (!conversation || !Array.isArray(conversation.messages) || conversation.messages.length === 0) {
                setWelcomeVisible(true);
                return;
            }

            setWelcomeVisible(false);
            conversation.messages.forEach((message) => {
                if (message.role === "user") appendUserMessage(message.content);
                else appendAiMessage(message.content);
            });
            elements.chatBox.scrollTop = elements.chatBox.scrollHeight;
        }

        function renderHistoryList() {
            const userState = getUserChatState();
            sortConversationsByUpdatedAt(userState);
            elements.historyList.innerHTML = "";

            if (userState.conversations.length === 0) {
                const empty = document.createElement("li");
                empty.className = "history-empty";
                empty.textContent = i18n[currentLang].emptyHistory;
                elements.historyList.appendChild(empty);
                return;
            }

            userState.conversations.forEach((conversation) => {
                const li = document.createElement("li");
                li.className = "history-item";
                if (conversation.id === userState.activeConversationId) {
                    li.classList.add("active");
                }
                li.textContent = conversation.title || (currentLang === "zh" ? "未命名会话" : "Untitled");
                li.addEventListener("click", () => {
                    setActiveConversation(conversation.id);
                    pendingAttachments = [];
                    renderAttachmentList();
                    renderHistoryList();
                    renderConversationMessages();
                });
                elements.historyList.appendChild(li);
            });
        }

        function renderUI() {
            if (!currentUser) return;
            const text = i18n[currentLang];
            const displayName = getDisplayName();

            elements.greeting.textContent = currentLang === "zh" ? `你好，${displayName}` : `Hello, ${displayName}`;
            elements.subtext.textContent = currentLang === "zh"
                ? "面向法律专业用户的智能检索与论证引擎"
                : "Professional legal intelligence and argumentation assistant";
            elements.avatar.textContent = getAvatarFromName(displayName);
            elements.nameInput.value = displayName;
            elements.accountDisplay.textContent = `${currentUser.account}（ID: ${currentUser.id}）`;

            elements.uiNewChat.textContent = text.newChat;
            elements.uiHistoryTitle.textContent = text.historyTitle;
            elements.inputBox.placeholder = text.placeholder;
            elements.uiSettingsTitle.textContent = text.settings;
            elements.uiAccountLabel.textContent = text.account;
            elements.uiNameLabel.textContent = text.editName;
            elements.uiLangLabel.textContent = text.lang;
            elements.uiModelLabel.textContent = text.model;
            elements.uiThinkingLabel.textContent = text.thinking;
            elements.uiWebSearchLabel.textContent = text.webSearch;
            elements.uiWebSearchDesc.textContent = text.webSearchDesc;
            elements.webSearchToggle.checked = readWebSearchEnabled();
            elements.modelSelect.value = writeSelectedModel(readSelectedModel());
            elements.thinkingModeSelect.value = writeThinkingMode(readThinkingMode());
            elements.thinkingText.textContent = text.thinkingStatus;
            elements.thinkingEta.textContent = text.thinkingEta.replace("{s}", "--");

            renderHistoryList();
            renderConversationMessages();
        }

        function formatSize(bytes) {
            if (!Number.isFinite(bytes) || bytes <= 0) return "0KB";
            return `${(bytes / 1024).toFixed(1)}KB`;
        }

        function attachmentKey(file) {
            return `${file.name}-${file.size}-${file.lastModified}`;
        }

        function inferMimeType(file) {
            const type = (file.type || "").toLowerCase();
            if (type) return type;
            const name = (file.name || "").toLowerCase();
            if (name.endsWith(".txt")) return "text/plain";
            if (name.endsWith(".md")) return "text/markdown";
            if (name.endsWith(".csv")) return "text/csv";
            if (name.endsWith(".json")) return "application/json";
            if (name.endsWith(".pdf")) return "application/pdf";
            if (name.endsWith(".png")) return "image/png";
            if (name.endsWith(".jpg") || name.endsWith(".jpeg")) return "image/jpeg";
            if (name.endsWith(".webp")) return "image/webp";
            if (name.endsWith(".doc")) return "application/msword";
            if (name.endsWith(".docx")) return "application/vnd.openxmlformats-officedocument.wordprocessingml.document";
            if (name.endsWith(".xls")) return "application/vnd.ms-excel";
            if (name.endsWith(".xlsx")) return "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet";
            return "";
        }

        function isTextAttachment(mimeType) {
            if (TEXT_MIME_TYPES.has(mimeType)) return true;
            return mimeType.startsWith("text/");
        }

        function isBinaryAttachment(mimeType) {
            return BINARY_MIME_TYPES.has(mimeType);
        }

        function renderAttachmentList() {
            elements.attachmentList.innerHTML = "";
            pendingAttachments.forEach((file, index) => {
                const chip = document.createElement("div");
                chip.className = "attachment-chip";

                const name = document.createElement("span");
                name.className = "attachment-name";
                name.textContent = `${file.name} (${formatSize(file.size)})`;

                const removeBtn = document.createElement("button");
                removeBtn.className = "attachment-remove";
                removeBtn.type = "button";
                removeBtn.textContent = "x";
                removeBtn.addEventListener("click", () => {
                    pendingAttachments = pendingAttachments.filter((_, idx) => idx !== index);
                    renderAttachmentList();
                });

                chip.appendChild(name);
                chip.appendChild(removeBtn);
                elements.attachmentList.appendChild(chip);
            });
            elements.attachBtn.classList.toggle("active", pendingAttachments.length > 0);
        }

        function addAttachments(files) {
            const errors = [];
            const knownKeys = new Set(pendingAttachments.map(attachmentKey));

            for (const file of files) {
                if (pendingAttachments.length >= MAX_ATTACHMENTS) {
                    errors.push(`最多只能上传 ${MAX_ATTACHMENTS} 个附件`);
                    break;
                }
                if (knownKeys.has(attachmentKey(file))) {
                    continue;
                }
                if (file.size > MAX_FILE_SIZE_BYTES) {
                    errors.push(`${file.name} 超过 6MB 限制`);
                    continue;
                }

                const mimeType = inferMimeType(file);
                if (!isTextAttachment(mimeType) && !isBinaryAttachment(mimeType)) {
                    errors.push(`${file.name} 类型不支持，请使用 txt/md/csv/json/pdf/png/jpg/webp/doc/docx/xls/xlsx`);
                    continue;
                }

                pendingAttachments.push(file);
                knownKeys.add(attachmentKey(file));
            }

            if (errors.length) {
                alert(errors.join("\n"));
            }
            renderAttachmentList();
        }

        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => {
                    const result = String(reader.result || "");
                    const base64 = result.includes(",") ? result.split(",")[1] : result;
                    if (!base64) {
                        reject(new Error(`文件 ${file.name} 编码失败`));
                        return;
                    }
                    resolve(base64);
                };
                reader.onerror = () => reject(new Error(`文件 ${file.name} 读取失败`));
                reader.readAsDataURL(file);
            });
        }

        async function serializeAttachment(file) {
            const mimeType = inferMimeType(file) || "application/octet-stream";
            if (isTextAttachment(mimeType)) {
                let text = await file.text();
                if (text.length > MAX_TEXT_ATTACHMENT_CHARS) {
                    text = text.slice(0, MAX_TEXT_ATTACHMENT_CHARS);
                }
                return { name: file.name, mimeType, text };
            }
            return {
                name: file.name,
                mimeType,
                data: await fileToBase64(file)
            };
        }

        async function buildAttachmentPayload(attachments) {
            return Promise.all(attachments.map((file) => serializeAttachment(file)));
        }

        function buildUserPreview(text, attachments) {
            const lines = [];
            lines.push(text || "（仅上传附件）");
            if (attachments.length > 0) {
                lines.push(`附件：${attachments.map((file) => file.name).join("、")}`);
            }
            return lines.join("\n");
        }

        function getConversationHistorySnapshot(conversation, limit = 0) {
            if (!conversation || !Array.isArray(conversation.messages)) return [];
            const messages = limit > 0
                ? conversation.messages.slice(Math.max(0, conversation.messages.length - limit))
                : conversation.messages;
            return messages.map((message) => ({
                role: message.role,
                content: String(message.content || "")
            }));
        }

        function clearThinkingProgress() {
            if (thinkingProgressTimer) {
                clearInterval(thinkingProgressTimer);
                thinkingProgressTimer = null;
            }
        }

        function startThinkingProgress(expectedMs) {
            clearThinkingProgress();
            const totalMs = Math.max(15_000, Number(expectedMs) || THINKING_MODE_TIMEOUT_MS[DEFAULT_THINKING_MODE]);
            const startedAt = Date.now();

            elements.thinkingStatus.hidden = false;
            elements.thinkingBar.style.width = "2%";
            elements.thinkingText.textContent = i18n[currentLang].thinkingStatus;
            elements.thinkingEta.textContent = i18n[currentLang].thinkingEta.replace("{s}", String(Math.ceil(totalMs / 1000)));

            thinkingProgressTimer = setInterval(() => {
                const elapsed = Date.now() - startedAt;
                const ratio = Math.min(0.95, elapsed / totalMs);
                const percent = Math.max(2, Math.floor(ratio * 100));
                const remainSec = Math.max(0, Math.ceil((totalMs - elapsed) / 1000));
                elements.thinkingBar.style.width = `${percent}%`;
                elements.thinkingEta.textContent = i18n[currentLang].thinkingEta.replace("{s}", String(remainSec));
            }, 250);
        }

        function finishThinkingProgress() {
            clearThinkingProgress();
            elements.thinkingBar.style.width = "100%";
            elements.thinkingEta.textContent = i18n[currentLang].thinkingEta.replace("{s}", "0");
            setTimeout(() => {
                elements.thinkingStatus.hidden = true;
                elements.thinkingBar.style.width = "0";
            }, 320);
        }

        function setAuthRequiredState() {
            clearThinkingProgress();
            elements.thinkingStatus.hidden = true;
            elements.thinkingBar.style.width = "0";
            clearAuthToken();
            authToken = "";
            currentUser = null;
            elements.modalOverlay.classList.remove("active");
            elements.appRoot.classList.add("hidden");
            elements.loginOverlay.style.display = "flex";
        }

        async function requestBackend(pathName, options = {}) {
            const {
                method = "GET",
                body = null,
                requireAuth = false,
                timeoutMs = 45_000
            } = options;
            const endpoints = buildBackendApiUrls(pathName);
            let lastMessage = i18n[currentLang].noBackend;
            let lastError = new Error(lastMessage);

            for (let i = 0; i < endpoints.length; i++) {
                const endpoint = endpoints[i];
                const isLast = i === endpoints.length - 1;
                const controller = new AbortController();
                const timeout = setTimeout(() => controller.abort(), Math.max(15_000, Number(timeoutMs) || 45_000));

                try {
                    const headers = { "Content-Type": "application/json" };
                    if (authToken) {
                        headers.Authorization = `Bearer ${authToken}`;
                    }

                    const response = await fetch(endpoint, {
                        method,
                        headers,
                        body: body ? JSON.stringify(body) : undefined,
                        signal: controller.signal
                    });
                    const data = await response.json().catch(() => ({}));

                    if (!response.ok) {
                        if (response.status === 401 && requireAuth) {
                            setAuthRequiredState();
                            throw new Error(i18n[currentLang].sessionExpired);
                        }
                        const message = data.message || data.error || `请求失败（${response.status}）`;
                        const backendError = new Error(message);
                        backendError.statusCode = response.status;
                        backendError.errorCode = String(data.errorCode || "");
                        throw backendError;
                    }
                    return data;
                } catch (error) {
                    const message = String(error?.message || "");
                    if (/aborted|timeout/i.test(message)) {
                        lastMessage = i18n[currentLang].timeoutError;
                        lastError = new Error(lastMessage);
                    } else if (/failed to fetch|load failed|network|networkerror/i.test(message)) {
                        lastMessage = `${i18n[currentLang].noBackend}（${endpoint}）`;
                        lastError = new Error(lastMessage);
                    } else {
                        lastMessage = message || lastMessage;
                        lastError = error instanceof Error ? error : new Error(lastMessage);
                    }
                    const canRetry = !isLast && /failed to fetch|load failed|network|networkerror/i.test(lastMessage);
                    if (canRetry) {
                        clearTimeout(timeout);
                        continue;
                    }
                    throw lastError;
                } finally {
                    clearTimeout(timeout);
                }
            }
            throw lastError;
        }

        async function requestChat(text, attachments, conversationId, historyMessages, timeoutMs) {
            const attachmentPayload = await buildAttachmentPayload(attachments);
            const selectedModel = readSelectedModel();
            try {
                const data = await requestBackend("/api/chat", {
                    method: "POST",
                    requireAuth: true,
                    timeoutMs: Math.max(20_000, Number(timeoutMs) + 20_000),
                    body: {
                        message: text,
                        attachments: attachmentPayload,
                        model: selectedModel,
                        conversationId,
                        webSearch: readWebSearchEnabled(),
                        timeoutMs,
                        history: Array.isArray(historyMessages) ? historyMessages : []
                    }
                });
                const reply = typeof data.reply === "string" ? data.reply.trim() : "";
                if (!reply) {
                    throw new Error("后端返回为空，请稍后重试");
                }
                return reply;
            } catch (error) {
                const errorCode = String(error?.errorCode || "");
                const message = String(error?.message || "");
                if (errorCode === "UPSTREAM_QUOTA_EXCEEDED" || /quota|配额/i.test(message)) throw new Error(i18n[currentLang].quotaError);
                if (errorCode === "UPSTREAM_MODEL_NOT_AVAILABLE" || /模型不可用/i.test(message)) throw new Error(i18n[currentLang].modelUnavailable);
                if (errorCode === "UPSTREAM_TIMEOUT" || /超时/i.test(message)) throw new Error(i18n[currentLang].timeoutError);
                if (errorCode === "UPSTREAM_NETWORK_ERROR" || /代理|network|后端服务/i.test(message)) throw new Error(i18n[currentLang].networkError);
                throw error;
            }
        }

        async function sendMessage() {
            if (!currentUser) {
                setAuthRequiredState();
                return;
            }
            const text = elements.inputField.value.trim();
            const attachmentsSnapshot = [...pendingAttachments];
            if (!text && attachmentsSnapshot.length === 0) return;

            const activeConversation = ensureActiveConversation();
            const historySnapshot = getConversationHistorySnapshot(activeConversation, 0);
            const userPreview = buildUserPreview(text, attachmentsSnapshot);
            const selectedThinkingMode = readThinkingMode();
            const timeoutMs = getRequestTimeoutByThinkingMode(selectedThinkingMode);

            setWelcomeVisible(false);
            appendUserMessage(userPreview);
            addMessageToConversation(activeConversation.id, "user", userPreview);
            renderHistoryList();

            elements.inputField.value = "";
            elements.inputField.style.height = "auto";
            elements.inputField.disabled = true;
            elements.sendBtn.disabled = true;
            elements.attachBtn.disabled = true;
            elements.attachmentInput.disabled = true;
            elements.attachmentList.style.pointerEvents = "none";
            startThinkingProgress(timeoutMs);

            const aiContentNode = appendAiMessage("正在生成专业法律分析，请稍候...");
            try {
                const reply = await requestChat(
                    text,
                    attachmentsSnapshot,
                    activeConversation.id,
                    historySnapshot,
                    timeoutMs
                );
                aiContentNode.textContent = reply;
                addMessageToConversation(activeConversation.id, "ai", reply);
                pendingAttachments = [];
                renderAttachmentList();
                renderHistoryList();
            } catch (error) {
                const errorMessage = `调用失败：${error.message}`;
                aiContentNode.textContent = errorMessage;
                addMessageToConversation(activeConversation.id, "ai", errorMessage);
                renderHistoryList();
            } finally {
                finishThinkingProgress();
                elements.inputField.disabled = false;
                elements.sendBtn.disabled = false;
                elements.attachBtn.disabled = false;
                elements.attachmentInput.disabled = false;
                elements.attachmentList.style.pointerEvents = "auto";
                elements.inputField.focus();
                elements.chatBox.scrollTop = elements.chatBox.scrollHeight;
            }
        }

        async function tryRestoreSession() {
            const token = readAuthToken();
            if (!token) {
                setAuthRequiredState();
                return;
            }
            authToken = token;
            try {
                const data = await requestBackend("/api/session", { method: "GET", requireAuth: true });
                currentUser = data.user;
                await fetchModelOptions();
                elements.loginOverlay.style.display = "none";
                elements.appRoot.classList.remove("hidden");
                renderUI();
            } catch (error) {
                console.warn("恢复登录失败", error);
                setAuthRequiredState();
            }
        }

        async function handleLoginSubmit(event) {
            event.preventDefault();
            elements.loginError.textContent = "";
            const account = String(elements.loginAccount.value || "").trim();
            const password = String(elements.loginPassword.value || "");
            if (!account || !password) {
                elements.loginError.textContent = i18n[currentLang].loginFailed;
                return;
            }

            elements.loginSubmit.disabled = true;
            try {
                const data = await requestBackend("/api/login", {
                    method: "POST",
                    body: { account, password }
                });
                if (!data?.token || !data?.user) {
                    throw new Error(i18n[currentLang].loginFailed);
                }
                authToken = data.token;
                writeAuthToken(authToken);
                currentUser = data.user;
                elements.loginPassword.value = "";
                await fetchModelOptions();
                elements.loginOverlay.style.display = "none";
                elements.appRoot.classList.remove("hidden");
                renderUI();
            } catch (error) {
                elements.loginError.textContent = error.message || i18n[currentLang].loginFailed;
            } finally {
                elements.loginSubmit.disabled = false;
            }
        }

        async function logout() {
            try {
                await requestBackend("/api/logout", { method: "POST", requireAuth: true });
            } catch (error) {
                console.warn("退出登录请求失败", error);
            }
            pendingAttachments = [];
            renderAttachmentList();
            setAuthRequiredState();
        }

        elements.openSettings.addEventListener("click", () => elements.modalOverlay.classList.add("active"));
        elements.closeSettings.addEventListener("click", () => elements.modalOverlay.classList.remove("active"));
        elements.modalOverlay.addEventListener("click", (event) => {
            if (event.target === elements.modalOverlay) {
                elements.modalOverlay.classList.remove("active");
            }
        });

        elements.newChatBtn.addEventListener("click", () => {
            if (!currentUser) {
                setAuthRequiredState();
                return;
            }
            createNewConversation();
            pendingAttachments = [];
            renderAttachmentList();
            renderHistoryList();
            renderConversationMessages();
            elements.inputField.focus();
        });

        elements.langSelect.addEventListener("change", (event) => {
            currentLang = event.target.value;
            renderUI();
        });

        elements.modelSelect.addEventListener("change", (event) => {
            elements.modelSelect.value = writeSelectedModel(event.target.value);
        });

        elements.thinkingModeSelect.addEventListener("change", (event) => {
            elements.thinkingModeSelect.value = writeThinkingMode(event.target.value);
        });

        elements.webSearchToggle.addEventListener("change", (event) => {
            writeWebSearchEnabled(Boolean(event.target.checked));
        });

        elements.nameInput.addEventListener("input", (event) => {
            const nextName = String(event.target.value || "").trim();
            if (!nextName) return;
            updateProfileName(nextName);
            elements.greeting.textContent = currentLang === "zh" ? `你好，${nextName}` : `Hello, ${nextName}`;
            elements.avatar.textContent = getAvatarFromName(nextName);
        });

        elements.nameInput.addEventListener("blur", (event) => {
            const nextName = String(event.target.value || "").trim();
            if (!nextName) return;
            syncProfileNameToServer(nextName);
        });

        elements.logoutBtn.addEventListener("click", logout);

        elements.inputField.addEventListener("input", function onInputResize() {
            this.style.height = "auto";
            this.style.height = `${this.scrollHeight}px`;
        });

        elements.attachBtn.addEventListener("click", () => elements.attachmentInput.click());
        elements.attachmentInput.addEventListener("change", (event) => {
            const files = Array.from(event.target.files || []);
            if (files.length > 0) {
                addAttachments(files);
            }
            elements.attachmentInput.value = "";
        });

        elements.sendBtn.addEventListener("click", sendMessage);
        elements.inputField.addEventListener("keydown", (event) => {
            if (event.key === "Enter" && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        });

        elements.loginForm.addEventListener("submit", handleLoginSubmit);

        renderAttachmentList();
        tryRestoreSession();
    </script>
</body>
</html>
